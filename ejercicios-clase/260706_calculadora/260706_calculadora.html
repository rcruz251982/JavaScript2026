<!DOCTYPE html>
<html lang="es-ES">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="estilos.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <title>Calculadora</title>
</head>



<body>

  <main class="calculadora">

    <h1> <i class="bi bi-calculator-fill"></i> Calculadora</h1>

    <section class="zona-nombre">

      <input type="text" id="nombre" placeholder="Tu nombre aquí">
      <button onclick="saludar()">Saludar</button>
      <p id="saludo"></p>


    </section>
    <section class="zona-calculadora">
      <div class="teclado">

        <button onclick="escribir('7')">7</button>
        <button onclick="escribir('8')">8</button>
        <button onclick="escribir('9')">9</button>
        <button onclick="escribir('/')">/</button>

        <button onclick="escribir('4')">4</button>
        <button onclick="escribir('5')">5</button>
        <button onclick="escribir('6')">6</button>
        <button onclick="escribir('*')">*</button>

        <button onclick="escribir('1')">1</button>
        <button onclick="escribir('2')">2</button>
        <button onclick="escribir('3')">3</button>
        <button onclick="escribir('_')">_</button>

        <button onclick="escribir('0')">0</button>
        <button onclick="escribir('.')">.</button>
        <button onclick="borrarPantalla()">C</button>
        <button onclick="escribir('+')">+</button>

      </div>

      <button class="boton-igual" onClick="calcular()">=</button>
      <input type="text" id="pantalla" placeholder="Resultado" readonly>

    </section>

    <p id="comentario"></p>

    <section class="extras">
      <button onClick="modoFiesta()">Modo Fiesta</button>
      <button onClick="limpiarTodo()">Limpiar</button>

    </section>

  </main>







  <script src="script-calculadora.js"></script>

</body>

</html>
